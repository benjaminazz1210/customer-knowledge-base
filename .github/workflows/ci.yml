name: NexusAI CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: nexusai-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-e2e:
    name: Strict E2E (CI Mock Backends)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify toolchain
        run: |
          set -euo pipefail
          python -V
          command -v node >/dev/null
          command -v npm >/dev/null
          command -v curl >/dev/null
          node -v
          npm -v

      - name: Wait for Qdrant
        run: |
          set -euo pipefail
          curl -fsS --retry 30 --retry-delay 2 --retry-connrefused http://127.0.0.1:6333/ >/dev/null

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          cd frontend
          npm ci

      - name: Install backend dependencies (CI profile)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run strict feature tests
        env:
          BASE_URL: http://127.0.0.1:18001
          NEXUSAI_EMBEDDING_BACKEND: mock
          NEXUSAI_LLM_BACKEND: mock
        run: |
          set -euo pipefail

          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 18001 > /tmp/nexusai-backend.log 2>&1 &
          BACKEND_PID=$!
          trap 'kill "${BACKEND_PID}" 2>/dev/null || true' EXIT

          for i in {1..60}; do
            if curl -fsS "${BASE_URL}/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS "${BASE_URL}/api/health" >/dev/null
          cd ..

          python backend/run_tests.py

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/nexusai-backend.log
          if-no-files-found: ignore
