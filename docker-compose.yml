name: nexusai

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    image: nexusai-backend:latest
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      PORT: "8001"
      DEBUG: "false"
    depends_on:
      - qdrant
      - redis
    volumes:
      - backend_generated:/app/generated

  frontend:
    image: nexusai-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  qdrant_data:
  redis_data:
  backend_generated:
